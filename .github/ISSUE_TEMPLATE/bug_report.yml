name: Bug report
description: Report a reproducible Lumora UI bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide steps, code, or a minimal repo.
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@lumora-ui/core"
        - "@lumora-ui/themes"
        - "@lumora-ui/react"
        - "@lumora-ui/vue"
        - "docs"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0"
