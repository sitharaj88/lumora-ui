name: Deploy docs to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Build docs (static export)
        run: pnpm --filter @lumora-design/docs build
        env:
          GITHUB_PAGES: "true"

      - name: Add .nojekyll (disable Jekyll so _next/ is served)
        run: |
          : > apps/docs/out/.nojekyll
          ls -la apps/docs/out/.nojekyll

      - name: Verify build output
        run: |
          test -d apps/docs/out/_next || (echo "::error::_next folder missing — basePath/output config broken"; exit 1)
          test -f apps/docs/out/.nojekyll || (echo "::error::.nojekyll missing — Pages will strip _next"; exit 1)
          test -f apps/docs/out/index.html || (echo "::error::index.html missing"; exit 1)
          echo "Top-level out/ entries:"
          ls -la apps/docs/out
          echo "_next/static counts:"
          find apps/docs/out/_next/static -type f | wc -l

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/out

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
